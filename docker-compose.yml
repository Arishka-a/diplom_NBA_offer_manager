# NBA-OfferManager: Docker Compose конфигурация
# Запуск: docker-compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nba-postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: nba_offermanager
      POSTGRES_USER: nba_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nbaDB123}
      PGDATA: /var/lib/postgresql/data/pgdata
    
    volumes:
      # Персистентное хранилище данных
      - postgres_data:/var/lib/postgresql/data
      # Скрипты инициализации (выполняются при первом запуске)
      - ./database/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    
    ports:
      # Проброс порта для удалённого доступа
      # Формат: "внешний_порт:внутренний_порт"
      - "${DB_PORT:-5432}:5432"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nba_user -d nba_offermanager"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    # Настройки для удалённого доступа
    command: >
      postgres
      -c listen_addresses='*'
      -c max_connections=100
      -c shared_buffers=256MB
      -c log_statement=all
      -c log_connections=on
      -c log_disconnections=on

  # Adminer - веб-интерфейс для управления БД (опционально)
  adminer:
    image: adminer:latest
    container_name: nba-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark

volumes:
  postgres_data:
    name: nba-postgres-data
